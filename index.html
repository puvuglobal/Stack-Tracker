<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackTracker - Minimal</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff; color: #111; margin: 0; padding: 0; }
    .screen { padding: 40px; }
    #questionScreen { display: none; }
    .btn { padding: 10px 14px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="screen" id="welcomeScreen">
    <h1>StackTracker Minimal</h1>
    <p>Type a project name to begin</p>
    <div>
      <label for="projectName">Project Name</label><br/>
      <input id="projectName" placeholder="e.g., My SaaS Idea" />
    </div>
    <button id="startBtn" class="btn" disabled>Start Building</button>
  </div>

  <div class="screen" id="questionScreen">
    <h2>Question 1</h2>
    <p>Placeholder: This is a skeleton nav to verify flow.</p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function(){
      const input = document.getElementById('projectName');
      const btn = document.getElementById('startBtn');
      const welcome = document.getElementById('welcomeScreen');
      const question = document.getElementById('questionScreen');
      if (input && btn && welcome && question) {
        btn.disabled = true;
        input.addEventListener('input', (e)=>{ btn.disabled = !e.target.value.trim(); });
        input.addEventListener('keydown', (e)=>{ if (e.key==='Enter' && e.target.value.trim()) startQuiz(); });
        btn.addEventListener('click', startQuiz);
        function startQuiz(){
          const nm = input.value.trim();
          if (!nm) return;
          welcome.style.display = 'none';
          question.style.display = 'block';
          document.title = nm;
        }
      }
    });
  </script>
</body>
</html>
