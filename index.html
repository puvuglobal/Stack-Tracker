<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackTracker - SaaS Architecture Decision Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1e3a5f; --secondary: #2d5a87; --accent: #00d4aa; --accent-dim: rgba(0,212,170,0.15); --bg: #0a1628; --surface: #12243d; --text: #e8f1f8; --text2: #8ba3bc; --border: #1e4976; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; font-weight: 600; }
    .app { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px; position: fixed; height: 100vh; display: flex; flex-direction: column; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .sidebar-header h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .logo-box { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), var(--secondary)); border-radius: 6px; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .sidebar-actions { display: flex; gap: 6px; margin-bottom: 12px; }
    .sidebar-btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text2); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .sidebar-btn:hover { border-color: var(--accent); color: var(--text); }
    .sidebar-btn.danger:hover { border-color: #ef4444; color: #ef4444; }
    .idea-btn { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 6px; color: var(--bg); font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .idea-btn:hover { opacity: 0.9; }
    .ideas-list { overflow-y: auto; flex: 1; }
    .idea-item { padding: 10px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; gap: 8px; }
    .idea-item:hover { background: rgba(255,255,255,0.05); }
    .idea-item.active { background: var(--accent-dim); border-color: var(--accent); }
    .idea-checkbox { width: 16px; height: 16px; accent-color: var(--accent); }
    .idea-name { flex: 1; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .idea-date { font-size: 11px; color: var(--text2); }
    
    /* Main */
    .main { flex: 1; margin-left: 260px; padding: 24px; max-width: 900px; }
    header { margin-bottom: 24px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .header-row h1 { font-size: 24px; }
    .progress { display: flex; align-items: center; gap: 12px; }
    .progress-bar { width: 120px; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    .progress-text { font-size: 13px; color: var(--text2); }
    
    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .q-category { display: inline-block; padding: 4px 10px; background: var(--accent-dim); color: var(--accent); border-radius: 20px; font-size: 12px; margin-bottom: 12px; }
    .q-title { font-size: 22px; margin-bottom: 8px; }
    .q-desc { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
    .q-desc strong { color: var(--accent); }
    
    /* Options */
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { padding: 14px 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
    .option:hover { border-color: var(--accent); }
    .option.selected { border-color: var(--accent); background: var(--accent-dim); }
    .option-radio { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .option.selected .option-radio { border-color: var(--accent); background: var(--accent); }
    .option.selected .option-radio::after { content: ''; width: 6px; height: 6px; background: var(--bg); border-radius: 50%; }
    .option-icon { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .option-icon svg { width: 14px; height: 14px; stroke: var(--accent); }
    .option-text { flex: 1; }
    .option-title { font-weight: 600; font-size: 14px; }
    .option-desc { font-size: 12px; color: var(--text2); }
    .option-stack { font-size: 11px; color: var(--accent); margin-top: 4px; }
    
    /* Knowledge */
    .knowledge { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 20px; }
    .knowledge h3 { font-size: 13px; color: var(--accent); margin-bottom: 12px; }
    .knowledge p { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .knowledge strong { color: var(--text); }
    
    /* Nav */
    .nav { display: flex; justify-content: space-between; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
    .nav-left, .nav-right { display: flex; gap: 8px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Welcome */
    .welcome { text-align: center; padding: 60px 20px; }
    .welcome h1 { font-size: 36px; margin-bottom: 12px; }
    .welcome p { color: var(--text2); max-width: 400px; margin: 0 auto 32px; }
    .input-box { margin-bottom: 20px; }
    .input-box input { width: 100%; max-width: 360px; padding: 14px; background: var(--surface); border: 2px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; }
    .input-box input:focus { outline: none; border-color: var(--accent); }
    .input-box label { display: block; text-align: left; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    
    /* Review */
    .review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .review-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .review-item-title { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .review-item-value { font-size: 14px; font-weight: 600; }
    
    /* Results */
    .tabs { display: flex; gap: 4px; background: var(--surface); padding: 4px; border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { padding: 8px 16px; background: transparent; border: none; color: var(--text2); cursor: pointer; border-radius: 6px; font-size: 14px; }
    .tab.active { background: var(--primary); color: var(--text); }
    .doc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .doc-header { padding: 12px 16px; background: rgba(0,0,0,0.2); }
    .doc-body { padding: 16px; max-height: 400px; overflow-y: auto; }
    .doc-body pre { font-size: 12px; white-space: pre-wrap; line-height: 1.6; }
    .results-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    
    .screen { display: none; }
    .screen.active { display: block; }
    
    @media(max-width:700px){ .sidebar{display:none} .main{margin-left:0} .review-grid{grid-template-columns:1fr} }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2><span class="logo-box">ST</span> StackTracker</h2>
    </div>
    <div class="sidebar-actions">
      <button class="sidebar-btn" onclick="resetCurrentIdea()">↺ Reset</button>
      <button class="sidebar-btn danger" onclick="deleteSelectedIdeas()">🗑 Delete</button>
    </div>
    <button class="idea-btn" onclick="newIdea()">+ New Idea</button>
    <div class="ideas-list" id="ideasList"></div>
  </aside>
  
  <main class="main">
    <!-- Welcome -->
    <div class="screen active" id="welcomeScreen">
      <div class="welcome">
        <h1>Architecture Wizard</h1>
        <p>Answer questions to generate a complete architecture blueprint. Your answers determine the tech stack.</p>
        <div class="input-box">
          <label>Project Name</label>
          <input type="text" id="projectName" placeholder="e.g., Puvu Global Coffee">
        </div>
        <button class="btn btn-primary" id="startBtn">Start Building</button>
      </div>
    </div>

    <!-- Question -->
    <div class="screen" id="questionScreen">
      <header>
        <div class="header-row">
          <h1 id="projectTitle">Project</h1>
          <div class="progress">
            <span class="progress-text" id="progressText">Question 1 of 50</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          </div>
        </div>
      </header>
      <div class="card">
        <div class="q-category" id="qCategory">Product Type</div>
        <h2 class="q-title" id="qTitle"></h2>
        <p class="q-desc" id="qDesc"></p>
        <div class="options" id="optionsList"></div>
      </div>
      <div class="knowledge" id="knowledgeBox">
        <h3>Why This Matters</h3>
        <div id="knowledgeText"></div>
      </div>
      <div class="nav">
        <div class="nav-left">
          <button class="btn btn-secondary" id="backBtn" onclick="goBack()">← Back</button>
        </div>
        <div class="nav-right">
          <button class="btn btn-secondary" onclick="skipQuestion()">Skip →</button>
          <button class="btn btn-secondary" onclick="completeEarly()">Complete Early ⚡</button>
          <button class="btn btn-primary" id="nextBtn" onclick="goNext()">Next →</button>
        </div>
      </div>
    </div>

    <!-- Review -->
    <div class="screen" id="reviewScreen">
      <h2 style="margin-bottom:8px">Review Your Answers</h2>
      <p style="color:var(--text2);margin-bottom:20px">Verify before generating blueprint.</p>
      <div class="review-grid" id="reviewGrid"></div>
      <div class="nav">
        <button class="btn btn-secondary" onclick="showScreen('question')">← Back</button>
        <button class="btn btn-primary" onclick="generateBlueprint()">Generate Blueprint ⚡</button>
      </div>
    </div>

    <!-- Results -->
    <div class="screen" id="resultsScreen">
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="saveToFile()">📁 Save to File</button>
        <button class="btn btn-secondary" onclick="copyToClipboard()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="newIdea()">↺ New Idea</button>
      </div>
      <div class="tabs" id="tabs"></div>
      <div id="tabContents"></div>
    </div>
  </main>
</div>

<script>
// =====================
// KNOWLEDGE SCHEMA - Based on Data supporting repo.txt
// =====================
const knowledgeSchema = {
  // PRODUCT TYPES - defines core modules needed
  productTypes: {
    marketplace: { modules: ['auth', 'billing', 'orders', 'inventory', 'search', 'messaging', 'analytics', 'notifications'] },
    saas: { modules: ['auth', 'billing', 'dashboard', 'settings', 'teams', 'webhooks', 'analytics'] },
    social: { modules: ['auth', 'posts', 'comments', 'likes', 'follows', 'messages', 'notifications', 'media'] },
    ecommerce: { modules: ['auth', 'products', 'cart', 'checkout', 'payments', 'inventory', 'shipping', 'orders'] },
    internal: { modules: ['auth', 'admin', 'dashboard', 'reports', 'workflows', 'audit'] },
    content: { modules: ['auth', 'content', 'media', 'comments', 'seo'] }
  },
  
  // CLIENT ARCHITECTURE
  clients: {
    mobile: { tech: 'React Native or PWA', backend: 'API-first design, offline support' },
    desktop: { tech: 'Web app + optional Electron/Tauri', backend: 'Standard REST API' },
    all: { tech: 'PWA + Responsive web', backend: 'BFF pattern recommended' }
  },
  
  // FRONTEND ARCHITECTURE DECISION TREE
  frontendDecision: [
    { q: 'Is the site mostly static?', yes: 'static', no: 'Continue' },
    { q: 'Does the product require high interactivity?', yes: 'spa', no: 'ssr' },
    { q: 'Does SEO matter?', yes: 'ssr', no: 'spa' },
    { q: 'Do you support multiple client apps?', yes: 'bff', no: 'Continue' },
    { q: 'How many engineers?', lessThan20: 'modularMonolith', more: 'microfrontends' }
  ],
  
  // FEATURES -> MODULES MAPPING
  featureModules: {
    authentication: ['login', 'register', 'logout', 'password_reset', 'session_management'],
    payments: ['checkout', 'subscriptions', 'invoices', 'webhooks_handler', 'usage_tracking'],
    realtime: ['websocket_handler', 'presence', 'notifications', 'live_updates'],
    search: ['query_builder', 'filters', 'sorting', 'autocomplete', 'facets'],
    file_uploads: ['upload_handler', 'storage_manager', 'transformation', 'cdn_delivery']
  },
  
  // SCALE TIERS
  scaleTiers: {
    '100': { db: 'single instance', cache: 'optional', infra: 'basic' },
    '1000': { db: 'indexed', cache: 'optional', infra: 'basic' },
    '10000': { db: 'read replicas', cache: 'recommended', infra: 'load balancer' },
    '100000': { db: 'caching layer', cache: 'essential', infra: 'CDN + rate limiting' },
    '1000000': { db: 'horizontal scaling', cache: 'distributed', infra: 'multi-region' }
  },
  
  // TEAM SIZE DECISIONS
  teamDecisions: {
    '1': { frontend: 'Simple monolith', backend: 'Monolith or BaaS', avoid: ['microservices'] },
    '2-5': { frontend: 'Modular monolith', backend: 'Domain separation', avoid: ['microfrontends'] },
    '6-20': { frontend: 'Modular with boundaries', backend: 'Service-oriented', avoid: [] },
    '20+': { frontend: 'Microfrontends possible', backend: 'Microservices', avoid: [] }
  },
  
  // DATABASE DECISION
  databaseDecision: [
    { q: 'Is data relational?', yes: 'postgresql', no: 'Continue' },
    { q: 'Need flexible schemas?', yes: 'mongodb', no: 'Continue' },
    { q: 'Need caching?', yes: 'redis', no: 'Continue' }
  ],
  
  // MODULE GENERATION RULES
  generateModules: function(answers) {
    const modules = new Set(['auth', 'users']); // Always needed
    
    // Product type modules
    const pt = answers.p001;
    if (pt && this.productTypes[pt]) {
      this.productTypes[pt].modules.forEach(m => modules.add(m));
    }
    
    // Feature-based modules
    if (answers.b003 === 'yes') this.featureModules.authentication.forEach(m => modules.add(m));
    if (answers.b007 && answers.b007 !== 'none') this.featureModules.payments.forEach(m => modules.add(m));
    if (answers.b005 === 'yes') this.featureModules.realtime.forEach(m => modules.add(m));
    if (answers.b008 && answers.b008 !== 'basic') this.featureModules.search.forEach(m => modules.add(m));
    if (answers.b006 && answers.b006.length > 0) this.featureModules.file_uploads.forEach(m => modules.add(m));
    
    return Array.from(modules).sort();
  },
  
  // ARCHITECTURE RECOMMENDATION
  getArchitecture: function(answers) {
    const recs = [];
    
    // Client architecture
    const client = answers.c001;
    if (client === 'mobile' || client === 'all') recs.push('BFF pattern recommended for mobile API');
    if (client === 'all') recs.push('PWA + Responsive web app');
    
    // Frontend based on SEO + interactivity
    if (answers.f002 === 'yes') recs.push('SSR required for SEO');
    if (answers.f002 === 'no') recs.push('SPA acceptable - no SEO needed');
    if (answers.f003 === 'high') recs.push('Client-side state management essential');
    
    // Scale recommendations
    const scale = answers.s001;
    if (scale && this.scaleTiers[scale]) {
      const tier = this.scaleTiers[scale];
      recs.push(`Scale tier: ${tier.db}, cache: ${tier.cache}`);
    }
    
    // Team size
    const team = answers.t001;
    if (team && this.teamDecisions[team]) {
      const td = this.teamDecisions[team];
      recs.push(`Team ${team}: ${td.frontend} frontend, ${td.backend} backend`);
    }
    
    return recs;
  }
};

// =====================
// QUESTIONS - Based on data supporting repo.txt
// =====================
const questions = [
  // PRODUCT TYPE (10)
  { id: 'p001', category: 'Product Type', title: 'What type of product are you building?', desc: 'Your product type determines the core systems and modules needed. <strong>This affects your entire tech stack.</strong>', type: 'single', stack: 'Framework varies by product', options: [
    { v: 'marketplace', t: 'Marketplace', d: 'Multi-sided platform with buyers & sellers', i: '🛒', stack: 'Next.js + BFF + Search + Payments' },
    { v: 'saas', t: 'SaaS Dashboard', d: 'Subscription software with user dashboards', i: '📊', stack: 'Next.js + Auth + Billing' },
    { v: 'social', t: 'Social Platform', d: 'User content, feeds, connections', i: '👥', stack: 'Next.js + Realtime + CDN' },
    { v: 'ecommerce', t: 'E-commerce', d: 'Online store with products & checkout', i: '🛍', stack: 'Next.js + Stripe + Inventory' },
    { v: 'internal', t: 'Internal Tool', d: 'Admin panel, CRM, data management', i: '🔒', stack: 'React SPA + Simple Auth' },
    { v: 'content', t: 'Content Site', d: 'Blog, docs, marketing, portfolio', i: '📝', stack: 'Next.js SSG/ISR + CMS' }
  ], know: 'Marketplaces need: payments, search, inventory, orders. SaaS needs: auth, billing, dashboards. Social needs: realtime, content moderation. Your choice here drives all subsequent recommendations.' },
  
  { id: 'p002', category: 'Product Type', title: 'What is the primary core feature?', desc: 'The main value proposition drives technical priorities.', type: 'single', options: [
    { v: 'transactions', t: 'Transactions', d: 'Buying, selling, payments, bookings', i: '💳', stack: 'ACID database + Payment processing' },
    { v: 'communication', t: 'Communication', d: 'Chat, messaging, video calls', i: '💬', stack: 'WebSockets + Media server' },
    { v: 'content', t: 'Content & Media', d: 'Videos, images, documents, streaming', i: '🎬', stack: 'CDN + Object Storage + Transcoding' },
    { v: 'analytics', t: 'Analytics & Data', d: 'Dashboards, reporting, visualizations', i: '📈', stack: 'Data warehouse + Caching' },
    { v: 'automation', t: 'Automation', d: 'Workflows, integrations, scheduling', i: '⚙️', stack: 'Job queue + Webhooks' },
    { v: 'collaboration', t: 'Collaboration', d: 'Real-time editing, team spaces', i: '🤝', stack: 'CRDTs + Presence + WebSockets' }
  ], know: 'Transactions require ACID compliance. Communication needs WebSockets. Content needs CDN. Analytics needs data warehousing. Each affects database and infrastructure choices.' },
  
  { id: 'p003', category: 'Product Type', title: 'How will you monetize?', desc: 'Revenue model affects billing infrastructure and compliance.', type: 'single', options: [
    { v: 'subscriptions', t: 'Subscriptions', d: 'Recurring monthly/yearly billing', i: '🔄', stack: 'Stripe Subscriptions + Webhooks' },
    { v: 'one-time', t: 'One-time Payments', d: 'Single purchases', i: '💰', stack: 'Stripe Checkout' },
    { v: 'freemium', t: 'Freemium', d: 'Free tier + paid upgrades', i: '⭐', stack: 'Stripe + Feature gating' },
    { v: 'marketplace', t: 'Marketplace Fees', d: 'Take a cut of transactions', i: '🏪', stack: 'Stripe Connect + Payouts' },
    { v: 'free', t: 'Free / Open Source', d: 'No monetization', i: '🆓', stack: 'No payment infrastructure' }
  ], know: 'Subscriptions need tier management, trials, failed payment handling. Marketplace needs Stripe Connect for split payments. Freemium needs feature gating logic.' },
  
  { id: 'p004', category: 'Product Type', title: 'Who are your primary users?', desc: 'User type affects authentication and onboarding.', type: 'single', options: [
    { v: 'b2c', t: 'Consumers (B2C)', d: 'Individual end users', i: '👤', stack: 'Social login + Simple onboarding' },
    { v: 'b2b', t: 'Businesses (B2B)', d: 'Companies, teams, organizations', i: '🏢', stack: 'Team management + SSO + Per-seat billing' },
    { v: 'internal', t: 'Internal Only', d: 'Employees only', i: '🔐', stack: 'SSO + IP allowlisting' }
  ], know: 'B2C needs social login and simple onboarding. B2B needs team/org management, SSO, per-seat billing. Internal needs SSO integration and audit logging.' },

  // CLIENTS - The key decision tree
  { id: 'c001', category: 'Client Architecture', title: 'What device types will your users access from?', desc: '<strong>This is critical!</strong> Your answer determines mobile vs desktop, and affects the entire backend design.', type: 'single', options: [
    { v: 'mobile', t: '📱 Mobile', d: 'iPhone, Android phones', i: '📱', stack: 'React Native or PWA' },
    { v: 'tablet', t: '📲 Tablet', d: 'iPads, Android tablets', i: '📲', stack: 'Responsive PWA' },
    { v: 'desktop', t: '💻 Desktop', d: 'Windows, Mac, Linux computers', i: '💻', stack: 'Web app + Desktop wrapper optional' },
    { v: 'all', t: '🌐 All Devices', d: 'Mobile, tablet, and desktop', i: '🌐', stack: 'PWA + Responsive web' }
  ], know: '<strong>IMPORTANT:</strong> If mobile/tablet is selected, you need iOS and/or Android options. If desktop is selected, show Windows/Mac/Linux. This drives: PWA vs native app, touch optimization, offline support, and API design.' },

  { id: 'c002', category: 'Client Architecture', title: 'Which mobile platforms (if applicable)?', desc: 'Only shown if mobile/tablet was selected. Multiple choices allowed.', type: 'multiple', condition: 'c001', conditionValue: ['mobile','tablet','all'], options: [
    { v: 'ios', t: '🍎 iOS', d: 'iPhone and iPad apps', i: '🍎', stack: 'React Native or Swift' },
    { v: 'android', t: '🤖 Android', d: 'Google Play apps', i: '🤖', stack: 'React Native or Kotlin' },
    { v: 'pwa', t: '🌐 PWA', d: 'Progressive Web App', i: '🌐', stack: 'Service workers + Offline support' }
  ], know: 'iOS needs Apple Developer account. Android needs Google Play. PWA works everywhere but limited native features. React Native can target both iOS and Android from one codebase.' },

  { id: 'c003', category: 'Client Architecture', title: 'Which desktop platforms (if applicable)?', desc: 'Only shown if desktop or "all devices" was selected.', type: 'multiple', condition: 'c001', conditionValue: ['desktop','all'], options: [
    { v: 'web', t: '🌐 Web', d: 'Browser-based application', i: '🌐', stack: 'Next.js or React' },
    { v: 'windows', t: '🪟 Windows', d: 'Windows desktop app', i: '🪟', stack: 'Electron or Tauri' },
    { v: 'mac', t: '🍎 Mac', d: 'macOS desktop app', i: '🍎', stack: 'Electron or SwiftUI' },
    { v: 'linux', t: '🐧 Linux', d: 'Linux desktop app', i: '🐧', stack: 'Electron or Tauri' }
  ], know: 'Web apps work everywhere. Desktop apps (Electron/Tauri) for native features. macOS apps can use SwiftUI. Consider Electron for cross-platform desktop from web technologies.' },

  { id: 'c004', category: 'Client Architecture', title: 'Do you need a public API for developers?', desc: 'Third-party developers building on your platform.', type: 'single', options: [

// =====================
// STATE
// =====================
let currentQIndex = 0;
let answers = {};
let projectName = '';
let ideas = JSON.parse(localStorage.getItem('stacktracker_ideas') || '[]');
let currentIdeaId = null;
let selectedIdeas = new Set();

// DOM
const $ = id => document.getElementById(id);

// Init
renderIdeasList();
$('projectName').addEventListener('input', e => $('startBtn').disabled = !e.target.value.trim());
$('startBtn').addEventListener('click', startQuiz);

function showScreen(screen) {
  ['welcome', 'question', 'review', 'results'].forEach(s => $(s + 'Screen').classList.remove('active'));
  $(screen + 'Screen').classList.add('active');
}

function startQuiz() {
  projectName = $('projectName').value.trim();
  if (!projectName) return;
  saveCurrentIdea();
  answers = {};
  currentQIndex = 0;
  $('projectTitle').textContent = projectName;
  showScreen('question');
  showQuestion();
  updateProgress();
}

function newIdea() {
  $('projectName').value = '';
  $('startBtn').disabled = true;
  answers = {};
  currentQIndex = 0;
  currentIdeaId = null;
  selectedIdeas.clear();
  $('projectTitle').textContent = 'StackTracker';
  renderIdeasList();
  showScreen('welcome');
}

function loadIdea(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  currentIdeaId = id;
  projectName = idea.name;
  answers = idea.answers || {};
  // Resume from last position or find first unanswered question
  currentQIndex = idea.lastQIndex || 0;
  if (currentQIndex === 0 && Object.keys(answers).length > 0) {
    // Find first unanswered question
    const filtered = getFilteredQuestions();
    for (let i = 0; i < filtered.length; i++) {
      const q = filtered[i];
      if (!answers[q.id] || (Array.isArray(answers[q.id]) && answers[q.id].length === 0)) {
        currentQIndex = i;
        break;
      }
    }
  }
  $('projectTitle').textContent = projectName + ' (Resume)';
  $('projectName').value = projectName;
  renderIdeasList();
  showScreen('question');
  showQuestion();
  updateProgress();
}

function resetCurrentIdea() {
  if (currentIdeaId) {
    answers = {};
    currentQIndex = 0;
    showQuestion();
    updateProgress();
  }
}

function deleteSelectedIdeas() {
  if (selectedIdeas.size === 0) return;
  if (!confirm(`Delete ${selectedIdeas.size} selected idea(s)?`)) return;
  ideas = ideas.filter(i => !selectedIdeas.has(i.id));
  localStorage.setItem('stacktracker_ideas', JSON.stringify(ideas));
  if (selectedIdeas.has(currentIdeaId)) newIdea();
  selectedIdeas.clear();
  renderIdeasList();
}

function saveCurrentIdea() {
  const data = { 
    id: currentIdeaId || Date.now(), 
    name: projectName, 
    answers: {...answers}, 
    lastQIndex: currentQIndex,
    updated: new Date().toISOString() 
  };
  if (currentIdeaId) {
    const idx = ideas.findIndex(i => i.id === currentIdeaId);
    if (idx >= 0) ideas[idx] = data;
  } else {
    currentIdeaId = data.id;
    ideas.push(data);
  }
  localStorage.setItem('stacktracker_ideas', JSON.stringify(ideas));
  renderIdeasList();
}

function toggleIdeaSelection(id, e) {
  e.stopPropagation();
  if (selectedIdeas.has(id)) selectedIdeas.delete(id);
  else selectedIdeas.add(id);
  renderIdeasList();
}

function renderIdeasList() {
  const list = $('ideasList');
  list.innerHTML = '';
  const allQuestions = questions;
  ideas.slice().reverse().forEach(idea => {
    const answeredCount = Object.keys(idea.answers || {}).filter(k => {
      const v = idea.answers[k];
      return v && (Array.isArray(v) ? v.length > 0 : true);
    }).length;
    const totalQuestions = getFilteredQuestions().length;
    const progress = answeredCount > 0 ? ` (${answeredCount}/${totalQuestions})` : '';
    
    const item = document.createElement('div');
    item.className = 'idea-item' + (idea.id === currentIdeaId ? ' active' : '');
    item.innerHTML = `
      <input type="checkbox" class="idea-checkbox" ${selectedIdeas.has(idea.id) ? 'checked' : ''} onclick="toggleIdeaSelection(${idea.id}, event)">
      <div style="flex:1;overflow:hidden">
        <div class="idea-name">${idea.name}</div>
        <div class="idea-date">${progress} • ${new Date(idea.updated).toLocaleDateString()}</div>
      </div>
    `;
    item.addEventListener('click', () => loadIdea(idea.id));
    list.appendChild(item);
  });
}

function getFilteredQuestions() {
  // Filter questions based on conditions
  return questions.filter(q => {
    if (!q.condition) return true;
    const conditionValue = answers[q.condition];
    if (!conditionValue) return true;
    if (Array.isArray(q.conditionValue)) {
      return q.conditionValue.includes(conditionValue) || q.conditionValue.some(v => Array.isArray(conditionValue) && conditionValue.includes(v));
    }
    return conditionValue === q.conditionValue;
  });
}

function showQuestion() {
  const filtered = getFilteredQuestions();
  const q = filtered[currentQIndex];
  
  $('qCategory').textContent = q.category;
  $('qTitle').textContent = q.title;
  $('qDesc').innerHTML = q.desc;
  $('knowledgeText').innerHTML = q.know;
  $('backBtn').style.display = currentQIndex === 0 ? 'none' : 'inline-block';

  const optsList = $('optionsList');
  optsList.innerHTML = '';

  q.options.forEach(opt => {
    const div = document.createElement('div');
    const isSelected = q.type === 'multiple' 
      ? (answers[q.id] || []).includes(opt.v)
      : answers[q.id] === opt.v;
    
    div.className = 'option' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <div class="option-radio"></div>
      <div class="option-icon">${opt.i || '📌'}</div>
      <div class="option-text">
        <div class="option-title">${opt.t}</div>
        <div class="option-desc">${opt.d}</div>
        <div class="option-stack">→ ${opt.stack}</div>
      </div>
    `;
    div.onclick = () => selectOption(q.id, opt.v, q.type);
    optsList.appendChild(div);
  });

  updateNextButton();
}

function selectOption(qId, value, type) {
  if (type === 'multiple') {
    if (!answers[qId]) answers[qId] = [];
    const idx = answers[qId].indexOf(value);
    if (idx > -1) answers[qId].splice(idx, 1);
    else answers[qId].push(value);
  } else {
    answers[qId] = value;
  }
  showQuestion();
}

function updateNextButton() {
  const filtered = getFilteredQuestions();
  const q = filtered[currentQIndex];
  if (q.type === 'multiple') {
    $('nextBtn').disabled = !answers[q.id] || answers[q.id].length === 0;
  } else {
    $('nextBtn').disabled = !answers[q.id];
  }
}

function goNext() {
  const filtered = getFilteredQuestions();
  if (currentQIndex < filtered.length - 1) {
    saveCurrentIdea();
    currentQIndex++;
    showQuestion();
    updateProgress();
  } else {
    saveCurrentIdea();
    showScreen('review');
    renderReview();
  }
}

function goBack() {
  if (currentQIndex > 0) {
    currentQIndex--;
    showQuestion();
    updateProgress();
  } else {
    showScreen('welcome');
  }
}

function skipQuestion() {
  const filtered = getFilteredQuestions();
  if (currentQIndex < filtered.length - 1) {
    currentQIndex++;
    showQuestion();
    updateProgress();
  } else {
    showScreen('review');
    renderReview();
  }
}

function completeEarly() {
  saveCurrentIdea();
  showScreen('review');
  renderReview();
}

function updateProgress() {
  const filtered = getFilteredQuestions();
  const pct = Math.round(((currentQIndex + 1) / filtered.length) * 100);
  $('progressText').textContent = `Question ${currentQIndex + 1} of ${filtered.length}`;
  $('progressFill').style.width = pct + '%';
}

function renderReview() {
  const grid = $('reviewGrid');
  grid.innerHTML = '';
  const answered = Object.entries(answers).filter(([k, v]) => v !== undefined && (Array.isArray(v) ? v.length > 0 : true));
  answered.slice(0, 15).forEach(([key, val]) => {
    const q = questions.find(x => x.id === key);
    if (!q) return;
    let displayVal = Array.isArray(val) ? val.map(v => q.options.find(o => o.v === v)?.t || v).join(', ') : (q.options.find(o => o.v === val)?.t || val);
    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `<div class="review-item-title">${q.title.substring(0,25)}</div><div class="review-item-value">${displayVal}</div>`;
    grid.appendChild(item);
  });
}

function generateBlueprint() {
  const tabs = $('tabs');
  const contents = $('tabContents');
  tabs.innerHTML = '';
  contents.innerHTML = '';
  $('projectTitle').textContent = projectName; // Clean title without (Resume)

  const docs = [
    { id: 'architecture', name: 'Architecture', content: generateDoc('architecture') },
    { id: 'stack', name: 'Tech Stack', content: generateDoc('stack') },
    { id: 'checklist', name: 'Checklist', content: generateDoc('checklist') },
    { id: 'deployment', name: 'Deployment', content: generateDoc('deployment') }
  ];

  docs.forEach((doc, idx) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (idx === 0 ? ' active' : '');
    tab.textContent = doc.name;
    tab.onclick = () => {
      tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      contents.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      $(doc.id + 'Tab').classList.add('active');
    };
    tabs.appendChild(tab);

    const content = document.createElement('div');
    content.className = 'tab-content' + (idx === 0 ? ' active' : '');
    content.id = doc.id + 'Tab';
    content.innerHTML = `<div class="doc-card"><div class="doc-header">${doc.name}</div><div class="doc-body"><pre>${doc.content}</pre></div></div>`;
    contents.appendChild(content);
  });

  showScreen('results');
}

function saveToFile() {

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${projectName.toLowerCase().replace(/\s+/g, '-')}-blueprint.md`;
  a.click();
  URL.revokeObjectURL(url);
}
